name: Build Plugin

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Plugin
        run: ./gradlew makePlugin

      - name: Upload CS3
        uses: actions/upload-artifact@v4
        with:
          name: DramaBox
          path: build/*.cs3
