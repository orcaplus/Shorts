name: Build Plugin

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Plugin
        run: ./gradlew makePlugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: cs3-plugin
          path: build/*.cs3
